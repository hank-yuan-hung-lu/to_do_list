<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>皮克敏畫布待辦清單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            --bg-color: #e6f2eb;
        }

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #e0f8e9 0%, #c1e8d5 50%, #dff2e3 100%);
            overflow: hidden; /* 防止桌面版滾動 */
            user-select: none; /* 防止意外選取文字 */
        }

        /* 畫布容器 */
        #board {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20px 20px, rgba(255,255,255,0.4) 2px, transparent 0);
            background-size: 40px 40px;
        }

        /* 玻璃擬態便利貼基礎樣式 */
        .sticky-note {
            position: absolute;
            width: 240px;
            height: 240px;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.1s ease, box-shadow 0.2s ease, opacity 0.3s ease, filter 0.3s ease;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 拖曳時的視覺回饋 */
        .sticky-note.dragging {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            transform: scale(1.03) rotate(2deg);
            cursor: grabbing !important;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        /* 頂部拖曳把手 */
        .drag-handle {
            cursor: grab;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
        }
        
        .sticky-note.dragging .drag-handle {
            cursor: grabbing;
        }

        /* 清單列表容器 */
        .task-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
        }

        /* 單行任務 */
        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        /* 勾選框 */
        .task-check {
            margin-top: 5px;
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #4ade80;
            flex-shrink: 0;
        }

        /* 任務文字輸入區 */
        .task-text {
            flex-grow: 1;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            font-size: 1rem;
            line-height: 1.5;
            color: #333;
            user-select: text;
            overflow: hidden; /* 隱藏自己的卷軸，靠外層 task-list 滾動 */
            padding: 0;
            min-height: 24px;
        }

        .task-text::placeholder {
            color: rgba(0,0,0,0.3);
        }

        .task-text.completed {
            text-decoration: line-through;
            color: rgba(0, 0, 0, 0.4);
        }

        /* 新增項目按鈕 */
        .add-task-btn {
            background: transparent;
            border: none;
            color: rgba(0,0,0,0.4);
            cursor: pointer;
            text-align: left;
            padding: 8px 0 0 0;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .add-task-btn:hover {
            color: rgba(0,0,0,0.8);
        }

        /* 自訂捲軸 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

        /* 動畫 */
        @keyframes popIn {
            0% { transform: scale(0.5) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8) translateY(-20px); opacity: 0; }
        }

        .is-removing {
            animation: fadeOut 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
        }

        /* 手機與平板 RWD 適配 (Grid 模式) */
        @media (max-width: 768px) {
            body {
                overflow: auto; /* 允許整體捲動 */
            }
            #board {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 16px;
                padding: 16px;
                padding-bottom: 100px; /* 留白給新增按鈕 */
                align-content: start;
                height: 100vh;
                overflow-y: auto;
            }
            .sticky-note {
                position: relative !important;
                left: auto !important;
                top: auto !important;
                width: 100% !important;
                height: 220px !important;
                transform: none !important;
            }
            .sticky-note.dragging {
                transform: none !important;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }
            .drag-handle {
                cursor: default;
            }
            #rwd-hint {
                display: block !important;
            }
        }
        
        /* 皮克敏色系 (結合微毛玻璃背景) */
        .color-red { background-color: rgba(255, 205, 210, 0.85); }
        .color-yellow { background-color: rgba(255, 245, 157, 0.85); }
        .color-blue { background-color: rgba(187, 222, 251, 0.85); }
        .color-purple { background-color: rgba(225, 190, 231, 0.85); }
        .color-white { background-color: rgba(245, 245, 245, 0.9); }
        .color-pink { background-color: rgba(248, 187, 208, 0.85); }

        /* UI 按鈕共用 */
        .action-btn {
            background: rgba(255, 255, 255, 0.5);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.1);
        }

        /* 暗黑模式樣式 */
        body.dark-mode {
            background: linear-gradient(135deg, #121c17 0%, #080d0a 50%, #0d1410 100%);
        }
        body.dark-mode #board {
            background-image: radial-gradient(circle at 20px 20px, rgba(255,255,255,0.05) 2px, transparent 0);
        }
        body.dark-mode .sticky-note {
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        body.dark-mode .task-text {
            color: #e0e0e0;
        }
        body.dark-mode .task-text::placeholder {
            color: rgba(255,255,255,0.3);
        }
        body.dark-mode .task-text.completed {
            color: rgba(255,255,255,0.3);
        }
        body.dark-mode .add-task-btn {
            color: rgba(255,255,255,0.4);
        }
        body.dark-mode .add-task-btn:hover {
            color: rgba(255,255,255,0.8);
        }
        body.dark-mode .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.2); 
        }

        /* 針對暗黑模式調整稍微暗沈一點的玻璃色調 */
        body.dark-mode .color-red { background-color: rgba(140, 50, 60, 0.75); }
        body.dark-mode .color-yellow { background-color: rgba(140, 120, 40, 0.75); }
        body.dark-mode .color-blue { background-color: rgba(40, 80, 140, 0.75); }
        body.dark-mode .color-purple { background-color: rgba(100, 60, 140, 0.75); }
        body.dark-mode .color-white { background-color: rgba(100, 100, 100, 0.75); }
        body.dark-mode .color-pink { background-color: rgba(140, 70, 100, 0.75); }
        
        body.dark-mode .action-btn {
            background: rgba(0, 0, 0, 0.3);
            color: #ccc;
        }
        body.dark-mode .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        body.dark-mode #add-btn {
            background: rgba(30, 40, 35, 0.8);
            color: #4ade80;
            border-color: #2f4f3f;
        }
        body.dark-mode #add-btn:hover {
            background: rgba(40, 55, 45, 1);
        }
        body.dark-mode #theme-toggle {
            background: rgba(30, 40, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

    </style>
</head>
<body>

    <!-- 暗黑模式切換按鈕 -->
    <button id="theme-toggle" class="fixed top-4 left-4 w-10 h-10 bg-white/50 backdrop-blur-md rounded-full shadow-md flex items-center justify-center text-xl z-50 hover:bg-white transition-all border border-gray-200 cursor-pointer" title="切換暗黑模式">
        🌙
    </button>

    <!-- 畫布區域 -->
    <div id="board">
        <!-- RWD 提示字 -->
        <div id="rwd-hint" class="absolute top-4 left-1/2 -translate-x-1/2 text-green-800/50 font-bold hidden w-full text-center tracking-widest text-sm pointer-events-none z-0">
            ~ 網格瀏覽模式 ~
        </div>
    </div>

    <!-- 浮動新增按鈕 -->
    <button id="add-btn" class="fixed bottom-8 right-8 w-16 h-16 bg-white/80 backdrop-blur-md rounded-full shadow-xl flex items-center justify-center text-3xl text-green-600 hover:bg-white hover:scale-110 hover:rotate-90 transition-all duration-300 z-50 border border-green-100">
        +
    </button>

    <script>
        // 皮克敏風格設定檔
        const pikminTypes = [
            { color: 'color-red', icons: ['🌱', '🌿', '🌺'] },
            { color: 'color-yellow', icons: ['🌱', '🌿', '🌼'] },
            { color: 'color-blue', icons: ['🌱', '🌿', '🌸'] },
            { color: 'color-purple', icons: ['🌱', '🌿', '🌷'] },
            { color: 'color-white', icons: ['🌱', '🌿', '💮'] },
            { color: 'color-pink', icons: ['🌱', '🌿', '🏵️'] }
        ];

        // 所有可選顏色與圖案
        const allColors = ['color-red', 'color-yellow', 'color-blue', 'color-purple', 'color-white', 'color-pink'];
        const allIcons = ['🌱', '🌿', '🌺', '🌼', '🌸', '🌷', '💮', '🏵️', '🍄', '🍀'];

        // 狀態管理
        let notes = [];
        let maxZIndex = 10;
        const board = document.getElementById('board');
        const addBtn = document.getElementById('add-btn');

        // 拖曳狀態變數
        let isDragging = false;
        let currentDragElement = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // 初始化
        function init() {
            loadNotes();
            setupEventListeners();
        }

        // 從 LocalStorage 載入資料 (並自動升級舊資料格式)
        function loadNotes() {
            const saved = localStorage.getItem('pikmin-notes');
            if (saved) {
                notes = JSON.parse(saved);
                notes.forEach(noteData => {
                    if (noteData.zIndex > maxZIndex) maxZIndex = noteData.zIndex;
                    
                    // 【資料格式升級邏輯】：舊版單純的 text 字串 -> 轉換成 tasks 陣列
                    if (noteData.text !== undefined && !noteData.tasks) {
                        const lines = noteData.text.split('\n').filter(line => line.trim() !== '');
                        if (lines.length > 0) {
                            noteData.tasks = lines.map(line => ({ id: generateId(), text: line, completed: noteData.completed || false }));
                        } else {
                            noteData.tasks = [];
                        }
                        // 刪除舊屬性
                        delete noteData.text;
                        delete noteData.completed;
                    }

                    renderNote(noteData);
                });
            } else {
                // 預設給一張教學便利貼
                createNewNote(window.innerWidth / 2 - 120, window.innerHeight / 2 - 120, [
                    "雙擊畫布新增便利貼",
                    "可以自由拖曳移動位置",
                    "點擊勾勾完成任務，按下 Enter 建立下一行"
                ]);
            }
        }

        // 儲存至 LocalStorage
        function saveNotes() {
            localStorage.setItem('pikmin-notes', JSON.stringify(notes));
        }

        // 產生唯一的 ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // 隨機取得皮克敏風格
        function getRandomPikminStyle() {
            const type = pikminTypes[Math.floor(Math.random() * pikminTypes.length)];
            const icon = type.icons[Math.floor(Math.random() * type.icons.length)];
            return { colorClass: type.color, icon: icon };
        }

        // 建立新便利貼資料模型 (支援傳入陣列建立多個任務)
        function createNewNote(x, y, initialTasks = []) {
            const style = getRandomPikminStyle();
            
            const safeX = Math.max(20, Math.min(x, window.innerWidth - 260));
            const safeY = Math.max(20, Math.min(y, window.innerHeight - 260));

            // 將預設文字轉為任務格式
            let defaultTasks = [];
            if (Array.isArray(initialTasks) && initialTasks.length > 0) {
                defaultTasks = initialTasks.map(t => ({ id: generateId(), text: t, completed: false }));
            } else {
                defaultTasks = [{ id: generateId(), text: "", completed: false }];
            }

            const newNote = {
                id: generateId(),
                tasks: defaultTasks,
                x: safeX,
                y: safeY,
                zIndex: ++maxZIndex,
                colorClass: style.colorClass,
                icon: style.icon
            };
            notes.push(newNote);
            renderNote(newNote);
            saveNotes();
        }

        // 渲染便利貼至 DOM
        function renderNote(noteData) {
            const noteEl = document.createElement('div');
            noteEl.className = `sticky-note ${noteData.colorClass}`;
            noteEl.id = `note-${noteData.id}`;
            noteEl.style.left = `${noteData.x}px`;
            noteEl.style.top = `${noteData.y}px`;
            noteEl.style.zIndex = noteData.zIndex;

            // 移除原本整張便利貼的 complete-btn
            noteEl.innerHTML = `
                <div class="drag-handle" title="按住拖曳">
                    <span class="note-icon text-xl drop-shadow-sm select-none cursor-pointer hover:scale-125 transition-transform" title="點擊更換圖案">${noteData.icon}</span>
                    <div class="actions flex gap-1">
                        <button class="action-btn color-btn" title="更換顏色">🎨</button>
                        <button class="action-btn delete-btn" title="刪除整張便利貼">❌</button>
                    </div>
                </div>
                <div class="task-list custom-scrollbar"></div>
                <button class="add-task-btn"><span class="text-lg leading-none">+</span> 新增項目</button>
            `;

            const dragHandle = noteEl.querySelector('.drag-handle');
            const deleteBtn = noteEl.querySelector('.delete-btn');
            const colorBtn = noteEl.querySelector('.color-btn');
            const iconEl = noteEl.querySelector('.note-icon');
            const taskListEl = noteEl.querySelector('.task-list');
            const addTaskBtn = noteEl.querySelector('.add-task-btn');

            // --- 任務清單渲染邏輯 ---
            function renderTasks() {
                taskListEl.innerHTML = '';
                noteData.tasks.forEach((task, index) => {
                    const taskItem = document.createElement('div');
                    taskItem.className = 'task-item';
                    taskItem.innerHTML = `
                        <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} />
                        <textarea class="task-text ${task.completed ? 'completed' : ''}" rows="1" placeholder="輸入項目...">${task.text}</textarea>
                        <button class="text-gray-400 hover:text-red-500 text-sm p-1 ml-auto transition-colors" title="刪除項目">✕</button>
                    `;

                    const checkbox = taskItem.querySelector('.task-check');
                    const textarea = taskItem.querySelector('.task-text');
                    const removeBtn = taskItem.querySelector('button');

                    // 文本自動長高
                    const autoResize = () => {
                        textarea.style.height = 'auto';
                        textarea.style.height = textarea.scrollHeight + 'px';
                    };
                    
                    // 初次渲染後調整高度 (使用 setTimeout 確保已放入 DOM)
                    setTimeout(autoResize, 0);

                    // 1. 勾選狀態變更
                    checkbox.addEventListener('change', (e) => {
                        task.completed = e.target.checked;
                        if(task.completed) textarea.classList.add('completed');
                        else textarea.classList.remove('completed');
                        saveNotes();
                    });

                    // 2. 文字輸入更新
                    textarea.addEventListener('input', (e) => {
                        task.text = e.target.value;
                        autoResize();
                        saveNotes();
                    });

                    // 3. 鍵盤事件：Enter 新增、Backspace 刪除
                    textarea.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            noteData.tasks.splice(index + 1, 0, { id: generateId(), text: '', completed: false });
                            saveNotes();
                            renderTasks();
                            // Focus 新建立的行
                            setTimeout(() => {
                                const inputs = taskListEl.querySelectorAll('.task-text');
                                if(inputs[index + 1]) inputs[index + 1].focus();
                            }, 0);
                        } else if (e.key === 'Backspace' && task.text === '') {
                            e.preventDefault();
                            noteData.tasks.splice(index, 1);
                            saveNotes();
                            renderTasks();
                            // Focus 刪除行的上一個
                            setTimeout(() => {
                                const inputs = taskListEl.querySelectorAll('.task-text');
                                if(inputs[index - 1]) inputs[index - 1].focus();
                                else if(inputs[index]) inputs[index].focus(); // 補救機制
                            }, 0);
                        }
                    });

                    // 4. 點擊 X 刪除單行任務
                    removeBtn.addEventListener('click', () => {
                        noteData.tasks.splice(index, 1);
                        saveNotes();
                        renderTasks();
                    });

                    taskListEl.appendChild(taskItem);
                });
            }

            // 初始化渲染清單
            renderTasks();

            // 新增項目按鈕
            addTaskBtn.addEventListener('click', () => {
                noteData.tasks.push({ id: generateId(), text: '', completed: false });
                saveNotes();
                renderTasks();
                // 滾動到底部並 Focus
                setTimeout(() => {
                    taskListEl.scrollTop = taskListEl.scrollHeight;
                    const inputs = taskListEl.querySelectorAll('.task-text');
                    if(inputs.length > 0) inputs[inputs.length - 1].focus();
                }, 10);
            });

            // 0. 切換圖案 (直接點擊左上角圖示)
            iconEl.addEventListener('click', (e) => {
                e.stopPropagation();
                let currentIndex = allIcons.indexOf(noteData.icon);
                let nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % allIcons.length;
                noteData.icon = allIcons[nextIndex];
                iconEl.innerText = noteData.icon;
                saveNotes();
            });

            // 0.5 切換顏色 (點擊調色盤按鈕)
            colorBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                let currentIndex = allColors.indexOf(noteData.colorClass);
                let nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % allColors.length;
                noteEl.classList.remove(noteData.colorClass);
                noteData.colorClass = allColors[nextIndex];
                noteEl.classList.add(noteData.colorClass);
                saveNotes();
            });

            // 1. 拖曳事件 (Mouse & Touch)
            dragHandle.addEventListener('mousedown', (e) => startDrag(e, noteEl, noteData));
            dragHandle.addEventListener('touchstart', (e) => startDrag(e, noteEl, noteData), { passive: false });

            // 3. 點擊便利貼時置頂 (包含點擊內部元素也置頂)
            noteEl.addEventListener('mousedown', () => bringToFront(noteEl, noteData));
            noteEl.addEventListener('touchstart', () => bringToFront(noteEl, noteData), { passive: true });

            // 5. 刪除整張便利貼
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                noteEl.classList.add('is-removing');
                setTimeout(() => {
                    notes = notes.filter(n => n.id !== noteData.id);
                    noteEl.remove();
                    saveNotes();
                }, 300);
            });

            board.appendChild(noteEl);
        }

        // 置頂功能
        function bringToFront(noteEl, noteData) {
            maxZIndex++;
            noteEl.style.zIndex = maxZIndex;
            noteData.zIndex = maxZIndex;
            saveNotes();
        }

        // --- 拖曳邏輯 ---
        function startDrag(e, noteEl, noteData) {
            // 如果是在手機網格模式下，禁止拖曳
            if (window.innerWidth <= 768) return;
            
            // 避免點擊到按鈕也觸發拖曳
            if(e.target.tagName.toLowerCase() === 'button' || e.target.closest('button')) return;

            e.preventDefault();
            isDragging = true;
            currentDragElement = { el: noteEl, data: noteData };
            
            bringToFront(noteEl, noteData);
            noteEl.classList.add('dragging');

            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

            const rect = noteEl.getBoundingClientRect();
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
        }

        function onDrag(e) {
            if (!isDragging || !currentDragElement) return;
            if (window.innerWidth <= 768) return;

            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

            let newX = clientX - dragOffsetX;
            let newY = clientY - dragOffsetY;

            const maxX = window.innerWidth - 50;
            const maxY = window.innerHeight - 50;
            newX = Math.max(-100, Math.min(newX, maxX));
            newY = Math.max(-50, Math.min(newY, maxY));

            currentDragElement.el.style.left = `${newX}px`;
            currentDragElement.el.style.top = `${newY}px`;
        }

        function endDrag(e) {
            if (!isDragging || !currentDragElement) return;
            
            currentDragElement.el.classList.remove('dragging');
            
            const newX = parseFloat(currentDragElement.el.style.left);
            const newY = parseFloat(currentDragElement.el.style.top);
            currentDragElement.data.x = newX;
            currentDragElement.data.y = newY;
            saveNotes();

            isDragging = false;
            currentDragElement = null;
        }

        // 設定全域事件監聽
        function setupEventListeners() {
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchmove', onDrag, { passive: false });
            document.addEventListener('touchend', endDrag);

            // 雙擊畫布新增便利貼
            board.addEventListener('dblclick', (e) => {
                if (e.target === board) {
                    createNewNote(e.clientX - 120, e.clientY - 40);
                }
            });

            // 右下角新增按鈕
            addBtn.addEventListener('click', () => {
                const centerX = window.innerWidth / 2 - 120 + (Math.random() * 60 - 30);
                const centerY = window.innerHeight / 2 - 120 + (Math.random() * 60 - 30);
                
                createNewNote(centerX, centerY);
                
                if (window.innerWidth <= 768) {
                    setTimeout(() => {
                        board.scrollTo({ top: board.scrollHeight, behavior: 'smooth' });
                    }, 100);
                }
            });

            // 視窗大小改變時的防呆處理
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    notes.forEach(noteData => {
                        const el = document.getElementById(`note-${noteData.id}`);
                        if (el) {
                            let adjusted = false;
                            if (noteData.x > window.innerWidth - 100) { noteData.x = window.innerWidth - 240; adjusted = true; }
                            if (noteData.y > window.innerHeight - 100) { noteData.y = window.innerHeight - 240; adjusted = true; }
                            
                            if (adjusted) {
                                el.style.left = `${noteData.x}px`;
                                el.style.top = `${noteData.y}px`;
                            }
                        }
                    });
                    saveNotes();
                }
            });
        }

        // 啟動應用程式
        window.onload = () => {
            initTheme();
            init();
        };

        // --- 暗黑模式邏輯 ---
        const themeToggle = document.getElementById('theme-toggle');
        let isDarkMode = localStorage.getItem('pikmin-theme') === 'dark';

        function initTheme() {
            applyTheme();
            themeToggle.addEventListener('click', () => {
                isDarkMode = !isDarkMode;
                localStorage.setItem('pikmin-theme', isDarkMode ? 'dark' : 'light');
                applyTheme();
            });
        }

        function applyTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                themeToggle.innerText = '☀️';
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.innerText = '🌙';
            }
        }

    </script>
</body>
</html>
